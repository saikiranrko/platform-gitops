apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: task-api-dev
  namespace: argocd
  labels:
    environment: dev
    team: platform
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/saikiranrko/platform-gitops
    targetRevision: main
    path: helm/task-api
    helm:
      releaseName: task-api
      valuesObject:
        image:
          repository: saiacr001.azurecr.io/task-api
          tag: latest
        replicaCount: 1
        env:
          - name: APP_ENV
            value: dev
          - name: LOG_LEVEL
            value: DEBUG
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            cpu: 250m
            memory: 128Mi
        keyVaultSecrets:
          enabled: false
        ingress:
          enabled: false
  destination:
    server: https://kubernetes.default.svc
    namespace: task-api-dev
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
    retry:
      limit: 3
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
